services:
  postgres:
    image: postgres:17-alpine
    container_name: vibe-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${DB_HOST_PORT}:5432"
    volumes:
      - vibe-shop-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: vibe-shop-api
    restart: unless-stopped
    environment:
      APP_PORT: ${APP_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      APP_SESSION_COOKIE_SECURE: ${APP_SESSION_COOKIE_SECURE}
      APP_DEMO_SEED_ENABLED: ${APP_DEMO_SEED_ENABLED}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_HOST_PORT}:8080"

  storefront:
    build:
      context: ./apps/storefront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN}
    container_name: vibe-shop-storefront
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:8080
      NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN}
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:${STOREFRONT_HOST_PORT}:3000"

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${ADMIN_DOMAIN}
    container_name: vibe-shop-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:8080
      NEXT_PUBLIC_API_BASE_URL: https://${ADMIN_DOMAIN}
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:${ADMIN_HOST_PORT}:3000"

volumes:
  vibe-shop-postgres:
