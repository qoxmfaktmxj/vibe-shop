name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      APP_PORT: 8180
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: vibeshop
      DB_USERNAME: vibeshop
      DB_PASSWORD: vibeshop
      API_BASE_URL: http://127.0.0.1:8180
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8180
      E2E_STOREFRONT_URL: http://127.0.0.1:3100
      E2E_ADMIN_URL: http://127.0.0.1:3100/admin
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3100,http://127.0.0.1:3000,http://localhost:3000,http://localhost:4100
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vibeshop
          POSTGRES_USER: vibeshop
          POSTGRES_PASSWORD: vibeshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vibeshop -d vibeshop"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/storefront/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install root dependencies
        run: npm ci

      - name: Install storefront dependencies
        run: npm ci --prefix apps/storefront

      - name: Lint storefront
        run: npm run lint:storefront

      - name: Typecheck storefront
        run: npm run typecheck:storefront

      - name: Build storefront
        run: npm run build:storefront

      - name: Test API
        run: npm run test:api

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        run: npm run qa:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: output/
          if-no-files-found: ignore
