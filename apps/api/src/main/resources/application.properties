spring.application.name=vibe-shop-api
server.port=${APP_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:vibeshop}
spring.datasource.username=${DB_USERNAME:vibeshop}
spring.datasource.password=${DB_PASSWORD:vibeshop}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:3200,http://127.0.0.1:3100,http://localhost:3000,http://127.0.0.1:3000}
app.session-cookie.secure=${APP_SESSION_COOKIE_SECURE:true}
app.session-cookie.same-site=${APP_SESSION_COOKIE_SAME_SITE:Lax}
app.demo.seed.enabled=${APP_DEMO_SEED_ENABLED:false}
app.demo.seed.target-customer-count=${APP_DEMO_TARGET_CUSTOMER_COUNT:3000}
app.demo.seed.target-products-per-category=${APP_DEMO_TARGET_PRODUCTS_PER_CATEGORY:100}
app.demo.seed.admin-email=${APP_DEMO_ADMIN_EMAIL:admin@vibeshop.local}
app.demo.seed.admin-password=${APP_DEMO_ADMIN_PASSWORD:}
app.demo.seed.admin-name=${APP_DEMO_ADMIN_NAME:Vibe Shop Admin}
